<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cámara PWA con GPS y Voz</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2196F3">
    
    <!-- Librerías de Leaflet para el mapa -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body { font-family: sans-serif; text-align: center; margin: 20px; background: #f0f0f0; }
        video, canvas { width: 100%; max-width: 500px; border-radius: 8px; background: #000; }
        #map { height: 300px; width: 100%; max-width: 500px; margin: 15px auto; border-radius: 8px; z-index: 1; border: 2px solid #ccc; }
        
        .controls { margin: 15px 0; display: flex; flex-direction: column; gap: 10px; align-items: center; }
        button { padding: 12px 24px; font-size: 16px; font-weight: bold; border: none; border-radius: 5px; cursor: pointer; width: 80%; max-width: 300px; }
        
        .btn-primary { background-color: #4CAF50; color: white; }
        .btn-secondary { background-color: #2196F3; color: white; }
        .btn-danger { background-color: #f44336; color: white; }
        .btn-export { background-color: #ff9800; color: white; margin-top: 15px; }
        
        /* Nuevos estilos para el control de nombre */
        .name-control { display: flex; align-items: center; justify-content: center; gap: 5px; width: 80%; max-width: 300px; margin: 5px 0; }
        .name-control input[type="text"] { flex-grow: 1; padding: 10px; font-size: 16px; border-radius: 5px; border: 1px solid #ccc; }
        .btn-mic { width: auto; padding: 10px 15px; font-size: 18px; background-color: #9c27b0; color: white; }
        
        input[type="number"] { padding: 8px; width: 60px; text-align: center; font-size: 16px; }
        label { font-size: 14px; color: #333; margin-bottom: -5px; }
        #status { margin-top: 15px; font-weight: bold; color: #555; }
    </style>
</head>
<body>

    <h1>Cámara GPS + Voz</h1>
    
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas" style="display:none;"></canvas>

    <div id="map"></div>

    <div class="controls">
        <button class="btn-primary" id="btn-start">1. Activar Cámara y GPS</button>
        
        <!-- Controles para el Nombre de la Foto -->
        <label for="photo-name">Prefijo del nombre de la foto:</label>
        <div class="name-control">
            <input type="text" id="photo-name" placeholder="Ej. Parcela_A">
            <button class="btn-mic" id="btn-mic" title="Dictar nombre">🎤</button>
        </div>
        
        <div>
            <label for="interval">Intervalo ráfaga (seg):</label>
            <input type="number" id="interval" value="3" min="1">
        </div>

        <button class="btn-secondary" id="btn-photo">Tomar Foto Única</button>
        <button class="btn-secondary" id="btn-burst">Iniciar Ráfaga Continua</button>
        <button class="btn-danger" id="btn-stop" style="display:none;">Detener Ráfaga</button>
        
        <button class="btn-export" id="btn-export">Exportar Ruta (.gpx)</button>
    </div>

    <div id="status">Listo para iniciar.</div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        const btnStart = document.getElementById('btn-start');
        const btnPhoto = document.getElementById('btn-photo');
        const btnBurst = document.getElementById('btn-burst');
        const btnStop = document.getElementById('btn-stop');
        const btnExport = document.getElementById('btn-export');
        const btnMic = document.getElementById('btn-mic');
        const inputInterval = document.getElementById('interval');
        const inputPhotoName = document.getElementById('photo-name');
        const status = document.getElementById('status');

        let stream = null;
        let burstInterval = null;

        let map;
        let userMarker;
        let currentPos = null;
        let photoPoints = [];
        const photoLayer = L.layerGroup();

        // ----------------------------------------
        // RECONOCIMIENTO DE VOZ (Speech To Text)
        // ----------------------------------------
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'es-ES'; // Idioma español
            recognition.continuous = false;
            recognition.interimResults = false;

            recognition.onstart = () => {
                btnMic.innerText = "🔴"; // Cambia el icono para mostrar que está grabando
                status.innerText = "Escuchando... Di el nombre para la foto.";
            };

            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                // Formatear el texto: quitar espacios finales y reemplazar espacios internos por guiones bajos
                const cleanName = transcript.trim().replace(/\s+/g, '_');
                inputPhotoName.value = cleanName;
                status.innerText = `Nombre reconocido: "${cleanName}"`;
            };

            recognition.onerror = (event) => {
                console.error("Error de voz:", event.error);
                status.innerText = "Error al reconocer voz. Intenta de nuevo.";
                btnMic.innerText = "🎤";
            };

            recognition.onend = () => {
                btnMic.innerText = "🎤";
            };

            btnMic.addEventListener('click', () => {
                recognition.start();
            });
        } else {
            // Si el navegador no soporta el reconocimiento de voz (muy raro hoy en día)
            btnMic.style.display = 'none';
            console.warn("La API de Reconocimiento de Voz no está soportada en este navegador.");
        }

        // ----------------------------------------
        // INICIALIZACIÓN
        // ----------------------------------------
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .catch(err => console.error('Error al registrar Service Worker', err));
            });
        }

        function initMap() {
            map = L.map('map').setView([0, 0], 2);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19,
                attribution: '© OpenStreetMap'
            }).addTo(map);
            photoLayer.addTo(map);
        }

        window.addEventListener('load', initMap);

        btnStart.addEventListener('click', async () => {
            try {
                status.innerText = "Solicitando cámara y GPS...";
                
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: { ideal: "environment" } },
                    audio: false
                });
                video.srcObject = stream;
                
                if ('geolocation' in navigator) {
                    navigator.geolocation.watchPosition(
                        (pos) => {
                            const { latitude, longitude } = pos.coords;
                            currentPos = { lat: latitude, lng: longitude };
                            
                            if (!userMarker) {
                                userMarker = L.marker([latitude, longitude]).addTo(map)
                                    .bindPopup("Tu ubicación actual").openPopup();
                                map.setView([latitude, longitude], 16);
                            } else {
                                userMarker.setLatLng([latitude, longitude]);
                            }
                        },
                        (err) => {
                            console.error("Error GPS:", err);
                            status.innerText = "Error GPS. Comprueba los permisos.";
                        },
                        { enableHighAccuracy: true, maximumAge: 0 }
                    );
                }

                status.innerText = "Cámara y GPS activados.";
            } catch (err) {
                console.error(err);
                status.innerText = "Error: No se pudo acceder a la cámara.";
            }
        });

        // ----------------------------------------
        // FUNCIÓN PRINCIPAL DE CAPTURA
        // ----------------------------------------
        function capturarYDescargar() {
            if (!stream) {
                status.innerText = "Error: Primero debes activar la cámara.";
                return false;
            }

            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            // Lógica para el Nombre de la Foto
            const timestamp = new Date().toISOString().replace(/[:.]/g, '-');
            let baseName = inputPhotoName.value.trim();
            
            // Si el campo está vacío, ponemos 'foto' por defecto
            if (!baseName) {
                baseName = 'foto';
            }

            // Construir nombre final: NombreEscogido_AÑO-MES-DIA...jpg
            const fileName = `${baseName}_${timestamp}.jpg`;
            
            // Guardar punto GPS
            if (currentPos) {
                const timeStr = new Date().toISOString();
                photoPoints.push({
                    lat: currentPos.lat,
                    lon: currentPos.lng,
                    time: timeStr,
                    name: fileName
                });

                L.circleMarker([currentPos.lat, currentPos.lng], {
                    color: 'red', fillColor: '#f03', fillOpacity: 0.5, radius: 6
                }).addTo(photoLayer).bindPopup(`<b>${fileName}</b>`);
            }
            
            // Descargar imagen
            canvas.toBlob((blob) => {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = fileName;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }, 'image/jpeg', 0.9);

            return true;
        }

        btnPhoto.addEventListener('click', () => {
            if (capturarYDescargar()) status.innerText = "Foto guardada con ubicación.";
        });

        btnBurst.addEventListener('click', () => {
            const ms = parseInt(inputInterval.value) * 1000;
            if (isNaN(ms) || ms < 1000) return alert("Intervalo mínimo: 1 segundo.");
            if (!stream) return alert("Activa la cámara primero.");

            status.innerText = "Ráfaga iniciada...";
            btnBurst.style.display = 'none';
            btnStop.style.display = 'block';

            capturarYDescargar();
            burstInterval = setInterval(() => {
                capturarYDescargar();
                status.innerText = `Capturando... Puntos guardados: ${photoPoints.length}`;
            }, ms);
        });

        btnStop.addEventListener('click', () => {
            clearInterval(burstInterval);
            btnBurst.style.display = 'block';
            btnStop.style.display = 'none';
            status.innerText = "Ráfaga detenida.";
        });

        btnExport.addEventListener('click', () => {
            if (photoPoints.length === 0) {
                alert("No hay fotos registradas para exportar.");
                return;
            }

            let gpx = `<?xml version="1.0" encoding="UTF-8"?>\n`;
            gpx += `<gpx version="1.1" creator="Camara PWA">\n`;
            
            photoPoints.forEach(pt => {
                gpx += `  <wpt lat="${pt.lat}" lon="${pt.lon}">\n`;
                gpx += `    <time>${pt.time}</time>\n`;
                gpx += `    <name>${pt.name}</name>\n`;
                gpx += `  </wpt>\n`;
            });
            
            gpx += `</gpx>`;

            const blob = new Blob([gpx], {type: 'application/gpx+xml'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `ruta_fotos_${new Date().toISOString().replace(/[:.]/g, '-')}.gpx`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });
    </script>
</body>
</html>
